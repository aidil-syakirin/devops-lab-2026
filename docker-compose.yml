version: "3.9"

services:
  db:
    image: postgres:15
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: appdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    container_name: flask-api
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg://appuser:apppass@db:5432/appdb
    ports:
      - "5000:5000"

volumes:
  postgres_data:
